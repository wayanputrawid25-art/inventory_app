name: Sync Neon Schema

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  sync-schema:
    name: Sync database schema to Neon
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database schema synchronization
        run: npm run init-db
